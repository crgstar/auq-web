<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>auq-web — Claude が開く質問画面</title>
<script id="auq-questions" type="application/json">__AUQ_DATA__</script>
<style>
  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --surface-2: #1c2128;
    --surface-3: #21262d;
    --rule:      #30363d;
    --rule-soft: #21262d;
    --text:      #f0f6fc;
    --text-dim:  #b1bac4;
    --text-faint:#7d8590;
    --accent:    #58a6ff;
    --accent-2:  #79c0ff;
    --accent-bg: rgba(88,166,255,.12);
    --code-bg:   #010409;
    --warn:      #d29922;
    --warn-bg:   rgba(210,153,34,.14);
    --danger:    #f85149;
    --danger-bg: rgba(248,81,73,.14);
    --ok:        #3fb950;
    --ok-bg:     rgba(63,185,80,.14);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font: 14px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* wrap: bottom padding は footbar 1段ぶん。footbar が縦積みになるモバイルだけ @media で増やす */
  .wrap { max-width: 960px; margin: 0 auto; padding: 0 20px 72px; }

  /* ───── header strip: 左に chips, 右に repo + missing を 1 行で並べる
     なぜ 1 行: 縦スペースを最大限 desc に渡したい。ナビと現在状態は横並びで十分 */
  .header-strip {
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 5;
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 0;
  }

  /* ───── Q chip strip ───── */
  .chips {
    flex: 1 1 auto;
    min-width: 0;  /* なぜ: 親 flex の中で overflow-x を効かせるため */
    display: flex; gap: 8px;
    overflow-x: auto;
    scrollbar-width: thin;
  }

  /* ───── header right (repo + missing) ───── */
  .header-meta {
    flex: 0 0 auto;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .header-meta .repo { color: var(--text); font-weight: 600; }
  .header-meta .missing-count.zero { color: var(--text-faint); }
  .header-meta .missing-count:not(.zero) { color: var(--warn); font-weight: 700; }
  .header-meta .missing-sep { margin: 0 6px; color: var(--rule); }
  .chip {
    flex: 0 0 auto;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 7px 14px;
    background: var(--surface-2);
    border: 1px solid var(--rule);
    border-radius: 999px;
    color: var(--text-dim);
    font: 600 12.5px/1 -apple-system, system-ui, sans-serif;
    cursor: pointer;
    transition: background .12s, border-color .12s, color .12s;
  }
  .chip:hover:not(.active) {
    background: var(--surface-3);
    color: var(--text);
    border-color: var(--text-faint);
  }
  .chip.active {
    background: var(--accent-bg);
    border-color: var(--accent);
    color: var(--accent-2);
  }
  .chip .state {
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 1.5px solid var(--text-faint);
    display: inline-block;
    position: relative;
    transition: background .12s, border-color .12s;
  }
  .chip[data-state="answered"] .state {
    background: var(--ok);
    border-color: var(--ok);
  }
  .chip[data-state="answered"] .state::after {
    content: "";
    position: absolute;
    inset: 1px;
    border-bottom: 1.5px solid #0d1117;
    border-right: 1.5px solid #0d1117;
    transform: rotate(45deg) translate(-1px, -1.5px);
    width: 4px; height: 7px;
    left: 3px; top: 0;
  }
  .chip.active .state {
    border-color: var(--accent);
  }
  .chip.active[data-state="pending"] .state {
    background: var(--accent);
    border-color: var(--accent);
  }

  /* ───── step stage ───── */
  .stage {
    position: relative;
    padding: 20px 0 8px;
  }
  .step {
    display: none;
    animation: fadeIn .18s ease;
  }
  .step.active { display: block; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: none; }
  }

  .step-head {
    display: flex; align-items: baseline; gap: 10px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .step-num {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px; font-weight: 700;
    color: var(--accent);
    background: var(--accent-bg);
    padding: 3px 8px;
    border-radius: 3px;
    letter-spacing: .04em;
    flex-shrink: 0;
  }
  .step-head h2 {
    margin: 0;
    flex: 1; min-width: 0;
    font-size: 19px; font-weight: 700;
    line-height: 1.4;
    letter-spacing: -.005em;
  }
  .kind-tag {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 10px; font-weight: 700;
    color: var(--text-dim);
    background: var(--surface-3);
    padding: 3px 7px;
    border-radius: 3px;
    border: 1px solid var(--rule);
    text-transform: uppercase;
    letter-spacing: .06em;
    flex-shrink: 0;
  }

  /* ───── desc ───── */
  .desc {
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 18px 22px;
    color: var(--text);
    font-size: 14.5px;
    line-height: 1.78;
  }
  .desc p { margin: 0 0 12px; color: var(--text-dim); }
  .desc p:last-child { margin-bottom: 0; }
  .desc strong { color: var(--text); font-weight: 700; }
  .desc em { color: var(--accent-2); font-style: normal; }
  .desc code {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 12.5px;
    background: var(--code-bg);
    color: var(--accent-2);
    padding: 1px 5px;
    border-radius: 3px;
    border: 1px solid var(--rule);
  }
  .desc pre {
    margin: 10px 0;
    padding: 12px 14px;
    background: var(--code-bg);
    border: 1px solid var(--rule);
    border-radius: 5px;
    overflow-x: auto;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 12.5px; line-height: 1.55;
    color: var(--text);
  }
  .desc pre .c { color: var(--text-faint); }
  .desc pre .k { color: #ff7b72; }
  .desc pre .s { color: #a5d6ff; }
  .desc pre .f { color: #d2a8ff; }
  .desc table {
    border-collapse: collapse; width: 100%;
    font-size: 12.5px; margin: 10px 0;
  }
  .desc th, .desc td {
    border: 1px solid var(--rule);
    padding: 7px 10px;
    text-align: left;
  }
  .desc th { background: var(--surface-2); color: var(--text); font-weight: 600; }
  .desc td { color: var(--text); }
  .desc figure { margin: 10px 0; }
  .desc figure svg {
    display: block;
    max-width: 100%;
    height: auto;
    background: var(--code-bg);
    border: 1px solid var(--rule);
    border-radius: 5px;
    padding: 10px;
  }
  .desc figcaption { font-size: 12px; color: var(--text-faint); margin-top: 8px; }

  /* ───── answer (普通の流れに配置) ───── */
  .answer { margin-top: 16px; }
  .options {
    list-style: none;
    margin: 0;
    padding: 0;
    display: grid;
    gap: 4px;
  }
  .opt {
    display: grid;
    grid-template-columns: 16px 1fr;
    gap: 10px;
    align-items: center;
    padding: 9px 12px;
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 5px;
    cursor: pointer;
    transition: background .1s, border-color .1s;
  }
  .opt:hover { background: var(--surface-2); }
  .opt:has(input:checked) {
    background: var(--accent-bg);
    border-color: var(--accent);
  }
  .opt input { margin: 0; accent-color: var(--accent); }
  .opt .lbl {
    font-weight: 600;
    color: var(--text);
    font-size: 13px;
    line-height: 1.4;
  }
  .opt:has(input:checked) .lbl { color: var(--accent-2); }
  .opt .desc-line {
    color: var(--text-faint);
    font-size: 12px;
    line-height: 1.4;
  }
  .opt .desc-line::before {
    content: " · ";
    color: var(--text-faint);
    margin: 0 2px;
  }

  /* Other row */
  .opt.other-row .other-text {
    display: none;
    width: 100%;
    margin-top: 8px;
    background: var(--code-bg);
    color: var(--text);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 8px 10px;
    font: inherit;
    font-size: 13px;
  }
  .opt.other-row:has(input:checked) .other-text { display: block; }
  .opt.other-row .other-text:focus { outline: none; border-color: var(--accent); }
  .opt.other-row > span { width: 100%; }  /* radio 横の "Other…" + 自由入力欄を grid セル幅いっぱいに */

  /* ───── rank ───── */
  .rank {
    list-style: none;
    margin: 0;
    padding: 0;
    display: grid;
    gap: 6px;
  }
  .rank-item {
    display: grid;
    grid-template-columns: 28px 14px 1fr;
    gap: 12px;
    align-items: center;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 6px;
    cursor: grab;
    user-select: none;
    transition: background .1s, border-color .1s;
  }
  .rank-item:hover { background: var(--surface-2); border-color: var(--accent); }
  .rank-item.dragging { opacity: .4; cursor: grabbing; }
  .rank-item.over { border-top: 2px solid var(--accent); }
  .rank-pos {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 13px; font-weight: 700;
    color: var(--accent); text-align: center;
  }
  .rank-grip { color: var(--text-faint); font-size: 12px; line-height: 1; letter-spacing: -2px; }
  .rank-grip::before { content: "⋮⋮"; }
  .rank-text .lbl { font-weight: 600; color: var(--text); font-size: 14px; }
  .rank-text .desc-line {
    color: var(--text-dim); font-size: 12.5px;
    margin-top: 1px; display: block;
  }

  /* ───── step-foot: comment + step-nav を 1 行 (HTML で直接構築) ───── */
  .step-foot {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-top: 14px;
  }
  .step-foot .comment { margin: 0; flex: 1 1 auto; min-width: 0; }
  .step-foot .step-nav { margin: 0; flex: 0 0 auto; }

  /* comment: details/summary で折りたたみ。なぜ閉じる: 通常 comment は空 */
  .comment summary {
    cursor: pointer;
    list-style: none;
    user-select: none;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 0;
    font-size: 11px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: .08em;
    font-weight: 600;
  }
  .comment summary::-webkit-details-marker { display: none; }
  .comment summary::before {
    content: "▸";
    font-size: 9px;
    color: var(--text-faint);
    transition: transform .1s;
    display: inline-block;
  }
  .comment[open] summary::before { content: "▾"; }
  .comment summary:hover { color: var(--text-dim); }
  .comment textarea {
    width: 100%;
    min-height: 40px;
    margin-top: 6px;
    background: var(--code-bg);
    color: var(--text);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 8px 10px;
    font: inherit;
    font-size: 13px;
    resize: vertical;
  }
  .comment textarea:focus { outline: none; border-color: var(--accent); }

  /* step nav (prev/next): コンパクト・右寄せ */
  .step-nav {
    display: flex;
    justify-content: flex-end;
    gap: 6px;
  }
  .step-nav button {
    font: 600 12px/1 -apple-system, system-ui, sans-serif;
    padding: 5px 10px;
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--rule);
    border-radius: 4px;
    cursor: pointer;
    transition: border-color .1s, color .1s, background .1s;
  }
  .step-nav button:hover:not(:disabled) {
    color: var(--text);
    border-color: var(--accent);
    background: var(--surface);
  }
  .step-nav button:disabled {
    opacity: .35;
    cursor: not-allowed;
  }

  /* ───── footbar (画面端まで広げる固定 bar) ─────
     なぜ left:0 right:0: viewport 全幅にして scrollbar の有無で位置がズレない様に */
  .footbar {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    background: var(--bg);
    border-top: 1px solid var(--rule);
    z-index: 5;
    box-shadow: 0 -12px 22px -10px rgba(0,0,0,.55);
  }
  .footbar-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 8px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .footbar .meta {
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 12px;
    color: var(--text-dim);
    flex-wrap: wrap;
    min-width: 0;
  }
  .footbar .timer {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .footbar .timer .num {
    color: var(--text);
    font-weight: 700;
    font-size: 12px;
  }
  .footbar .timer.warn .num { color: var(--warn); }
  .footbar .timer.danger .num { color: var(--danger); animation: pulse 1s ease infinite; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: .55; }
  }
  .footbar .missing-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 9px;
    background: var(--warn-bg);
    color: var(--warn);
    border: 1px solid var(--warn);
    border-radius: 12px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .02em;
  }
  .footbar .missing-pill[hidden] { display: none; }
  .footbar .actions {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }
  .footbar button {
    font: 600 12px/1 -apple-system, system-ui, sans-serif;
    padding: 6px 10px;
    border-radius: 4px;
    cursor: pointer;
  }
  .footbar button.reject {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--rule);
  }
  .footbar button.reject:hover { color: var(--danger); border-color: var(--danger); }
  .footbar button.submit {
    background: var(--accent);
    color: #0d1117;
    border: 1px solid var(--accent);
    font-weight: 700;
    padding: 6px 12px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .footbar button.submit:hover {
    background: var(--accent-2);
    border-color: var(--accent-2);
  }
  .footbar button.submit .hint {
    font: 600 11px/1 ui-monospace, "SF Mono", monospace;
    color: rgba(13,17,23,.65);
  }
  .footbar button.submit:disabled {
    opacity: .55;
    cursor: not-allowed;
    background: var(--surface-3);
    color: var(--text-faint);
    border-color: var(--rule);
  }
  .footbar button.submit:disabled .hint { color: var(--text-faint); }

  /* responsive: footbar が縦積みになる分、wrap の bottom padding を増やす */
  @media (max-width: 720px) {
    .footbar-inner {
      flex-direction: column;
      align-items: stretch;
    }
    .footbar .actions { justify-content: flex-end; }
    .wrap { padding-bottom: 130px; }
  }

  /* 1 質問のみの時: chip strip を出す価値が無いので畳む.
     header-strip 自体は repo / missing 表示のために残す */
  .header-strip.single-q .chips { display: none; }

  /* closing screen (after submit)
     実装時: POST /answer 完了後、サーバが exit するまでこの画面を残す。
             ユーザは「閉じていい」サインを見て手動でタブを閉じる想定。 */
  .closing-screen {
    display: none;
    position: fixed;
    inset: 0;
    align-items: center;
    justify-content: center;
    background: rgba(13,17,23,.86);
    backdrop-filter: blur(4px);
    z-index: 100;
  }
  .closing-screen.show { display: flex; }
  .closing-screen .panel {
    background: var(--surface);
    border: 1px solid var(--ok);
    border-radius: 8px;
    padding: 28px 36px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
  }
  .closing-screen .check {
    font-size: 40px;
    color: var(--ok);
    line-height: 1;
    margin-bottom: 8px;
  }
  .closing-screen .panel .label {
    font-size: 12px;
    color: var(--text-faint);
    margin-top: 8px;
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="header-strip" role="banner">
    <nav class="chips" id="chips" aria-label="質問ナビ"></nav>
    <div class="header-meta">
      <span class="repo" id="repo"></span>
      <span class="missing-sep">·</span>
      <span class="missing-count zero" id="missingCount">0</span> missing
    </div>
  </header>

  <main class="stage" id="stage"></main>
</div>

<footer class="footbar" role="contentinfo">
  <div class="footbar-inner">
    <div class="meta">
      <span class="timer" id="timer">⏱ <span class="num">--:--</span></span>
      <span class="missing-pill" id="missingPill" hidden>⚠ <span id="missingList"></span></span>
    </div>
    <div class="actions">
      <button type="button" class="reject" id="rejectBtn">reject</button>
      <button type="button" class="submit" id="submitBtn">submit <span class="hint">⌘↵</span></button>
    </div>
  </div>
</footer>

<div class="closing-screen" id="closingScreen" aria-hidden="true">
  <div class="panel">
    <div class="check">✓</div>
    <div>submitted</div>
    <div class="label">this window can be closed</div>
  </div>
</div>

<script>
(() => {
  const OTHER = '__other__';
  const data = JSON.parse(document.getElementById('auq-questions').textContent);
  const meta = data.meta || {};
  const questions = data.questions || [];
  const N = questions.length;
  const TIMEOUT_SEC = (meta.timeoutSec === undefined) ? 300 : meta.timeoutSec;
  const UNLIMITED = TIMEOUT_SEC === 0;
  const startedAt = Date.now();

  // ───── DOM builder helper.
  // props: {class, dataset:{...}, あとは element の property に流す}.
  // children: string は textNode に、null/false は skip、Array は flatten
  function el(tag, props = {}, ...children) {
    const e = document.createElement(tag);
    for (const [k, v] of Object.entries(props)) {
      if (v == null) continue;
      if (k === 'class') e.className = v;
      else if (k === 'dataset') Object.assign(e.dataset, v);
      else if (k in e) e[k] = v;
      else e.setAttribute(k, v);
    }
    for (const c of children.flat()) {
      if (c == null || c === false) continue;
      e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
    }
    return e;
  }

  // ───── header (repo) ─────
  const repoEl = document.getElementById('repo');
  if (meta.repo) {
    repoEl.textContent = meta.repo;
  } else {
    // repo が無ければ "...· 0 missing" の sep が浮くので header-meta 自体を簡略化
    repoEl.style.display = 'none';
    document.querySelector('.header-meta .missing-sep').style.display = 'none';
  }

  // ───── 1 質問時の UI 簡略化: chips を畳む ─────
  if (N === 1) document.querySelector('.header-strip').classList.add('single-q');

  // ───── chips ─────
  const chipsEl = document.getElementById('chips');
  questions.forEach((q, i) => {
    chipsEl.appendChild(el('button', {
      type: 'button',
      class: 'chip' + (i === 0 ? ' active' : ''),
      dataset: { step: String(i), state: 'pending' },
      'aria-label': `Q${i + 1} へ`,
    }, `Q${i + 1}`, el('span', { class: 'state', 'aria-hidden': 'true' })));
  });

  // ───── desc 内 <script> を実行可能化するヘルパ (§6.3).
  // innerHTML 後に <script> を新 element に差し替えると, ブラウザが「新しい
  // script element」と判断して実行する. type=module / src=... も意図通り動く
  function setDescHtml(target, html) {
    target.innerHTML = html;
    target.querySelectorAll('script').forEach(old => {
      const fresh = document.createElement('script');
      [...old.attributes].forEach(a => fresh.setAttribute(a.name, a.value));
      fresh.textContent = old.textContent;
      old.replaceWith(fresh);
    });
  }

  // ───── section builder ─────
  function buildOption(q, opt, inputType, isOther = false) {
    const labelChildren = [
      el('span', { class: 'lbl' }, isOther ? 'Other…' : opt.label),
      isOther
        ? el('input', { type: 'text', class: 'other-text',
                        dataset: { q: q.id }, placeholder: '自由入力' })
        : (opt.hint && el('span', { class: 'desc-line' }, opt.hint)),
    ];
    return el('li', {}, el('label', { class: 'opt' + (isOther ? ' other-row' : '') },
      el('input', { type: inputType, name: q.id, value: isOther ? OTHER : opt.value }),
      el('span', {}, ...labelChildren),
    ));
  }

  function buildRankItem(it, idx) {
    return el('li', {
      class: 'rank-item', draggable: true, dataset: { id: it.id },
    },
      el('span', { class: 'rank-pos' }, String(idx + 1)),
      el('span', { class: 'rank-grip' }),
      el('span', { class: 'rank-text' },
        el('span', { class: 'lbl' }, it.label),
        it.hint && el('span', { class: 'desc-line' }, it.hint),
      ),
    );
  }

  function buildAnswer(q) {
    if (q.kind === 'rank') {
      return el('ul', { class: 'rank', dataset: { rankFor: q.id } },
        ...(q.items || []).map(buildRankItem));
    }
    // single / multi: options + optional Other 行
    const inputType = q.kind === 'single' ? 'radio' : 'checkbox';
    const items = (q.options || []).map(opt => buildOption(q, opt, inputType));
    if (q.allowOther) items.push(buildOption(q, null, inputType, true));
    return el('ul', { class: 'options' }, ...items);
  }

  function buildSection(q, i) {
    const head = el('header', { class: 'step-head' },
      N > 1 && el('span', { class: 'step-num' }, `Q${i + 1} / ${N}`),
      el('h2', {}, q.title),
      el('span', { class: 'kind-tag' }, q.kind),
    );
    const desc = el('div', { class: 'desc' });
    const foot = el('div', { class: 'step-foot' },
      el('details', { class: 'comment' },
        el('summary', {}, 'comment'),
        el('textarea', {
          name: `${q.id}_comment`, id: `${q.id}_comment`,
          placeholder: '補足や条件付き選択など',
        }),
      ),
      N > 1 && el('div', { class: 'step-nav' },
        el('button', { type: 'button', class: 'prev',
                       textContent: '← prev', disabled: i === 0 }),
        el('button', { type: 'button', class: 'next',
                       textContent: 'next →', disabled: i === N - 1 }),
      ),
    );
    const sec = el('section', {
      class: 'step' + (i === 0 ? ' active' : ''),
      dataset: { step: String(i), kind: q.kind, q: q.id },
    }, head, desc, el('div', { class: 'answer' }, buildAnswer(q)), foot);

    setDescHtml(desc, q.descHtml || '');
    return sec;
  }

  // ───── stage build ─────
  const stageEl = document.getElementById('stage');
  questions.forEach((q, i) => stageEl.appendChild(buildSection(q, i)));

  // ───── step navigation ─────
  const chips = [...document.querySelectorAll('#chips .chip')];
  const steps = [...document.querySelectorAll('.step')];
  let current = 0;
  function showStep(i) {
    if (i < 0 || i >= N) return;
    current = i;
    steps.forEach((s, idx) => s.classList.toggle('active', idx === i));
    chips.forEach((c, idx) => c.classList.toggle('active', idx === i));
    if (chips[i]) chips[i].scrollIntoView({ block: 'nearest', inline: 'center', behavior: 'smooth' });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  chips.forEach(c => c.addEventListener('click', () => showStep(parseInt(c.dataset.step, 10))));
  stageEl.addEventListener('click', e => {
    if (e.target.matches('.prev')) showStep(current - 1);
    if (e.target.matches('.next')) showStep(current + 1);
  });

  // ───── answered detection ─────
  // step 内の Other... 自由入力欄の値. 未入力 (空 or whitespace のみ) は ''
  function otherText(step) {
    return step.querySelector('.other-text')?.value.trim() || '';
  }

  function isAnswered(stepIdx) {
    const step = steps[stepIdx];
    const kind = step.dataset.kind;
    const q = step.dataset.q;
    if (kind === 'single') {
      const r = step.querySelector(`input[name="${q}"]:checked`);
      if (!r) return false;
      return r.value !== OTHER || !!otherText(step);
    }
    if (kind === 'multi') {
      const cs = [...step.querySelectorAll(`input[name="${q}"]:checked`)];
      if (!cs.length) return false;
      return !cs.some(c => c.value === OTHER) || !!otherText(step);
    }
    if (kind === 'rank') return true;  // 任意の並びが valid
    return false;
  }

  const missingC = document.getElementById('missingCount');
  const missingP = document.getElementById('missingPill');
  const missingL = document.getElementById('missingList');

  function updateState() {
    const missing = [];
    chips.forEach((c, idx) => {
      const ans = isAnswered(idx);
      c.dataset.state = ans ? 'answered' : 'pending';
      if (!ans) missing.push('Q' + (idx + 1));
    });
    missingC.textContent = missing.length;
    missingC.classList.toggle('zero', missing.length === 0);
    if (missing.length) {
      missingP.hidden = false;
      missingL.textContent = missing.join(' ') + ' missing';
    } else {
      missingP.hidden = true;
    }
  }
  document.addEventListener('change', updateState);
  document.addEventListener('input', e => {
    if (!e.target.classList?.contains('other-text')) return;
    const wrap = e.target.closest('.other-row');
    const radio = wrap?.querySelector('input[type="radio"], input[type="checkbox"]');
    if (radio && e.target.value && !radio.checked) radio.checked = true;
    updateState();
  });
  updateState();

  // ───── rank drag (各 .rank list ごとに bind) ─────
  document.querySelectorAll('.rank').forEach(rank => {
    let dragEl = null, lastOver = null;
    rank.addEventListener('dragstart', e => {
      if (!e.target.classList?.contains('rank-item')) return;
      dragEl = e.target;
      e.target.classList.add('dragging');
    });
    rank.addEventListener('dragend', e => {
      if (!e.target.classList?.contains('rank-item')) return;
      e.target.classList.remove('dragging');
      lastOver?.classList.remove('over');
      lastOver = null;
      [...rank.children].forEach((li, i) => li.querySelector('.rank-pos').textContent = i + 1);
      dragEl = null;
      updateState();
    });
    rank.addEventListener('dragover', e => {
      e.preventDefault();
      const t = e.target.closest('.rank-item');
      if (!t || t === dragEl) return;
      if (lastOver !== t) {
        lastOver?.classList.remove('over');
        t.classList.add('over');
        lastOver = t;
      }
      const rect = t.getBoundingClientRect();
      const after = (e.clientY - rect.top) / rect.height > 0.5;
      rank.insertBefore(dragEl, after ? t.nextSibling : t);
    });
  });

  // ───── keys ─────
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); doSubmit(); return; }
    if (e.key === 'Escape') { e.preventDefault(); doReject(); return; }
    const tag = document.activeElement?.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA') return;
    if (N <= 1) return;
    if (e.key === 'ArrowLeft')  { e.preventDefault(); showStep(current - 1); }
    if (e.key === 'ArrowRight') { e.preventDefault(); showStep(current + 1); }
    if (/^[1-9]$/.test(e.key)) {
      const t = parseInt(e.key, 10) - 1;
      if (t < N) { e.preventDefault(); showStep(t); }
    }
  });

  // ───── timer (meta.timeoutSec 駆動) ─────
  const tEl = document.getElementById('timer');
  const tNum = tEl.querySelector('.num');
  if (UNLIMITED) {
    // 無制限なので timer を出さない (Skill 側で long-poll する想定)
    tEl.style.display = 'none';
  } else {
    let remain = TIMEOUT_SEC;
    let lastTxt = '';
    const writeTimer = () => {
      const m = String(Math.floor(remain / 60)).padStart(2, '0');
      const s = String(remain % 60).padStart(2, '0');
      const txt = `${m}:${s}`;
      if (txt === lastTxt) return;
      lastTxt = txt;
      tNum.textContent = txt;
      tEl.classList.toggle('warn',   remain <= 30 && remain > 10);
      tEl.classList.toggle('danger', remain <= 10 && remain > 0);
    };
    writeTimer();
    setInterval(() => {
      remain = Math.max(0, remain - 1);
      writeTimer();
    }, 1000);
  }

  // ───── submit / reject ─────
  function elapsedSec() {
    return Math.round((Date.now() - startedAt) / 1000);
  }

  function buildPayload() {
    const out = { event: 'answer', timedOut: false, answers: {}, elapsedSec: elapsedSec() };
    steps.forEach(step => {
      const q = step.dataset.q;
      const kind = step.dataset.kind;
      const comment = step.querySelector(`#${q}_comment`)?.value.trim() || '';
      const withCommon = (extra) => ({
        kind, ...extra, ...(comment ? { comment } : {}),
      });
      if (kind === 'single') {
        const r = step.querySelector(`input[name="${q}"]:checked`);
        out.answers[q] = withCommon({
          selected: r ? r.value : null,
          ...(r?.value === OTHER ? { otherText: otherText(step) } : {}),
        });
      } else if (kind === 'multi') {
        const sels = [...step.querySelectorAll(`input[name="${q}"]:checked`)].map(i => i.value);
        out.answers[q] = withCommon({
          selected: sels,
          ...(sels.includes(OTHER) ? { otherText: otherText(step) } : {}),
        });
      } else if (kind === 'rank') {
        const ranking = [...step.querySelectorAll('.rank-item')].map(li => li.dataset.id);
        out.answers[q] = withCommon({ ranking });
      }
    });
    return out;
  }

  function postAnswer(payload) {
    return fetch('/answer', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      keepalive: true,
    }).catch(err => console.error('POST /answer failed:', err));
  }

  function doSubmit() {
    document.getElementById('closingScreen').classList.add('show');
    postAnswer(buildPayload());
  }
  function doReject() {
    if (!confirm('reject しますか？ 回答せずに閉じます。')) return;
    document.getElementById('closingScreen').classList.add('show');
    postAnswer({ event: 'reject', timedOut: false, elapsedSec: elapsedSec() });
  }
  document.getElementById('submitBtn').addEventListener('click', doSubmit);
  document.getElementById('rejectBtn').addEventListener('click', doReject);
})();
</script>
</script>
</body>
</html>
